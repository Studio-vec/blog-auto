name: 블로그 자동 비공개 저장

on:
  schedule:
    # 매주 월·수·금 오전 9시 (KST) = UTC 00:00
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch:   # 수동 실행 버튼

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  draft:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Playwright 브라우저 설치
        run: playwright install chromium --with-deps

      - name: .env 파일 생성
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          echo "TISTORY_BLOG_NAME=${{ secrets.TISTORY_BLOG_NAME }}" >> .env
          echo "KAKAO_ID=${{ secrets.KAKAO_ID }}" >> .env
          echo "KAKAO_PW=${{ secrets.KAKAO_PW }}" >> .env
          echo "POST_DAYS=MON,WED,FRI" >> .env
          echo "POST_TIME=09:00" >> .env

      # GitHub Secret에서 세션 복원 (카카오 재로그인 불필요)
      - name: 티스토리 세션 복원
        run: echo "${{ secrets.TISTORY_SESSION }}" | base64 -d > tistory_session

      - name: 비공개 글 저장 실행
        run: python main.py --draft

      # 성공 시 갱신된 세션을 Secret에 덮어쓰기 (세션 만료 방지)
      - name: 티스토리 세션 갱신 저장
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f tistory_session ]; then
            SESSION_B64=$(base64 -w 0 tistory_session)
            gh secret set TISTORY_SESSION --body "$SESSION_B64" --repo ${{ github.repository }}
            echo "세션 Secret 갱신 완료"
          fi
